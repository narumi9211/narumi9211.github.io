<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>천유림 깃허브</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 샘플 페이지의 주요 스타일을 적용합니다. */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 5px solid #e0e0e0;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #2c3e50;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 5px;
            transition: background-color 0.3s;
        }
        .links a:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/150" alt="프로필 이미지" class="profile-img">
        
        <h1>천유림 (Yurim Cheon)</h1>
        <p>안녕하세요! 깃허브 페이지에 오신 것을 환영합니다.<br>
        현재 biomedical AI를 공부하며 CDSS 프로젝트를 진행하고 있습니다.</p>
        
        <div class="links">
            <a href="https://github.com/narumi9211">GitHub</a>
            <a href="mailto:이메일주소@example.com">Email</a>
        </div>
    </div>

</body>
</html>
